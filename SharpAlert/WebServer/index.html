<!DOCTYPE HTML>

<head>
	<title>SharpAlert</title>

</head>
<body>
	<img id="logo" src="/SharpAlert.png" alt="The SharpAlert logo." />
	<h1 id="header">SharpAlert Administrative Panel</h1>

	</div>

	<div class="uncontained">

			<h3>You can manage the state of SharpAlert here.</h3>
